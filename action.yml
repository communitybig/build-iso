name: "Build BigCommunity ISO"
description: "Builds a BigCommunity ISO image"

inputs:
  name:
    description: "Name for the ISO"
    required: true
    default: "bigcommunity"
  iso_profiles_repo:
    description: "ISO profiles repository to clone"
    required: false
    default: "https://github.com/talesam/iso-profiles"
  iso_profiles_branch:
    description: "Branch of the ISO profiles repository (optional)"
    required: false
  edition:
    description: "Name of the ISO profile to build"
    required: true
  manjaro_branch:
    description: "Manjaro branch (stable, testing, unstable)"
    required: true
    default: stable
  community_branch:
    description: "Community branch (stable, testing)"
    required: true
  biglinux_branch:
    description: "BigLinux branch (stable, testing)"
    required: true
  scope:
    description: "Build scope (full or minimal)"
    required: false
    default: "full"
  kernel:
    description: "Kernel version (latest, lts, oldLts)"
    required: true
  release_tag:
    description: "Release tag for the ISO"
    required: true
  tmate:
    description: "Enable debugging with tmate"
    required: false
    default: "false"
  office-chooser:
    description: "Include office suite"
    required: false
    default: "false"
  repo_unstable:
    description: "URL for unstable repository"
    required: false
  mirror_dev:
    description: "URL for development mirror"
    required: false
  mirror_unstable:
    description: "URL for unstable BigCommunity mirror"
    required: false
  github_token:
    description: "GitHub token for authentication"
    required: true

outputs:
  iso_path:
    description: "Path to the generated ISO file"

runs:
  using: "composite"
  steps:
    - name: Display the current user in CONTAINER
      shell: bash
      run: |
        # Display the current user in CONTAINER
        echo "##########################################################################"
        echo "Current host is     : $(hostname)"
        echo "Current user is     : $(whoami)"
        echo "Current user's groups: $(groups)"
        echo "Current user ID is  : $(id -u)"
        echo "Current user details: $(id)"
        echo "##########################################################################"
        df -hT || true
        echo "##########################################################################"
        ls -la /mnt || true
        echo "##########################################################################"

    - name: Setup build environment
      shell: bash
      run: |
        echo "Setting up build environment..."
        # Setup build environment
        # Update and install additional packages
        sudo pacman -Syu --quiet --needed --noconfirm \
          mktorrent \
          squashfs-tools \
          archiso \
          manjaro-tools \
          manjaro-tools-iso \
          calamares \
          calamares-tools \
          mkinitcpio > /dev/null

    - name: Adjustment in mkinitcpio hooks
      shell: bash
      run: |
        # Adjustment in mkinitcpio hooks (if still necessary)
        sudo sed -i -e 's|File|Path|' /usr/share/libalpm/hooks/*hook*
        
    - name: Adjust environment variables
      shell: bash
      run: |
        WORK_PATH="/__w/build-iso/build-iso"
        WORK_PATH_ISO_PROFILES="/__w/build-iso/build-iso/iso-profiles"
        PROFILE_PATH="/__w/build-iso/build-iso/iso-profiles/community"
        PATH_MANJARO_ISO_PROFILES="/usr/share/manjaro-tools/iso-profiles"
        PATH_MANJARO_TOOLS="/usr/share/manjaro-tools"
        VAR_CACHE_MANJARO_TOOLS="/var/cache/manjaro-tools"
        VAR_CACHE_MANJARO_TOOLS_ISO="/var/cache/manjaro-tools/iso"

        echo "WORK_PATH=$WORK_PATH" >> $GITHUB_ENV
        echo "WORK_PATH_ISO_PROFILES=$WORK_PATH_ISO_PROFILES" >> $GITHUB_ENV
        echo "PROFILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
        echo "PATH_MANJARO_ISO_PROFILES=$PATH_MANJARO_ISO_PROFILES" >> $GITHUB_ENV
        echo "PATH_MANJARO_TOOLS=$PATH_MANJARO_TOOLS" >> $GITHUB_ENV
        echo "VAR_CACHE_MANJARO_TOOLS=$VAR_CACHE_MANJARO_TOOLS" >> $GITHUB_ENV
        echo "VAR_CACHE_MANJARO_TOOLS_ISO=$VAR_CACHE_MANJARO_TOOLS_ISO" >> $GITHUB_ENV

    - name: Configure the environment for builduser
      shell: bash
      run: |
        # Set up the environment for the builduser
        echo 'PACKAGER="Community Package/ISO Build <talesam@gmail.com>"' | tee -a /home/builduser/.makepkg.conf
        mkdir -p /home/builduser/.config/manjaro-tools
        echo "run_dir=/__w/build-iso/build-iso/iso-profiles" | tee -a /home/builduser/.config/manjaro-tools/iso-profiles.conf
        git config --global --add safe.directory /__w/build-iso/build-iso/iso-profiles

        # Check the configurations
        echo "ConteĂşdo de /home/builduser/.makepkg.conf:"
        cat /home/builduser/.makepkg.conf
        echo "ConteĂşdo de /home/builduser/.config/manjaro-tools/iso-profiles.conf:"
        cat /home/builduser/.config/manjaro-tools/iso-profiles.conf
        echo "ConfiguraĂ§Ăµes git global:"
        git config --global --list

    - name: Additional configurations specific to ISO building
      shell: bash
      run: |
        # Additional specific configurations for ISO building
        sudo sed -i 's|dist_name=\$(get_distname)|dist_name=BigCommunity|g' /usr/lib/manjaro-tools/util.sh
        sudo sed -i 's|iso_name=\$(get_osid)|iso_name=bigcommunity|g' /usr/lib/manjaro-tools/util.sh

    - name: Configure disable-fsync
      shell: bash
      run: |
        echo "Configuring disable-fsync..."
        DISABLE_FSYNC_URL="https://raw.githubusercontent.com/biglinux/disable-fsync/main/disable-fsync/usr/lib/disable-fsync.so"
        DISABLE_FSYNC_FILE="/usr/lib/disable-fsync.so"
        PRELOAD_FILE="/etc/ld.so.preload"

        sudo wget "$DISABLE_FSYNC_URL" -O "$DISABLE_FSYNC_FILE"
        SHA256SUM=$(curl -s "$DISABLE_FSYNC_URL" | sha256sum | awk '{print $1}')
        echo "${SHA256SUM} ${DISABLE_FSYNC_FILE}" | sudo sha256sum --check || exit 1

        echo "${DISABLE_FSYNC_FILE}" | sudo tee -a "${PRELOAD_FILE}"
        sudo ldconfig

    - name: Pull and setup Community keys
      shell: bash
      run: |
        echo "Pulling and installing Community keys..."
        git clone https://github.com/biglinux/biglinux-key.git
        sudo install -dm755 /etc/pacman.d/gnupg/
        sudo install -m0644 biglinux-key/usr/share/pacman/keyrings/* /etc/pacman.d/gnupg/
        sudo rm -r biglinux-key
        
        # Initialize the pacman keyring, if necessary
        sudo pacman-key --init
        
        # Receive and sign the Community key
        sudo pacman-key --recv-keys AECEEE84E52BBFAA9F1C9DF01EA0CEEEB09B44A3
        sudo pacman-key --lsign-key AECEEE84E52BBFAA9F1C9DF01EA0CEEEB09B44A3
        
        # Update the pacman databases
        sudo pacman -Sy
        
        echo "Community keys installed and system updated."

    - name: Configure repositories and build environment
      shell: bash
      run: |
        # Configuring repositories and build environment...
        # Function to add repositories
        add_repository() {
          local arquivo_conf=$1

          # Adicione o repositĂłrio community-keyring
          if ! grep -q 'community-keyring' "$arquivo_conf"; then
            sudo sed -i '/SyncFirst/s/$/ community-keyring/' "$arquivo_conf"
          fi

          # Adicione o repositĂłrio biglinux-keyring
          if ! grep -q 'biglinux-keyring' "$arquivo_conf"; then
            sudo sed -i '/SyncFirst/s/$/ biglinux-keyring/' "$arquivo_conf"
          fi

          # Adicione o repositĂłrio biglinux-update-stable
          if ! grep -q 'biglinux-update-stable' "$arquivo_conf"; then
            sudo sed -i '/\[core\]/{x;/^$/!{x;H;};/^$/p;x;}' "$arquivo_conf"
            
            # Adiciona o conteĂşdo ao arquivo
            {
            echo '[biglinux-update-stable]'
            echo 'SigLevel = PackageRequired'
            echo 'Server = https://repo.biglinux.com.br/update-stable/$arch'
            } | sudo tee -a "$arquivo_conf"
          fi

          # Configure os repositĂłrios Manjaro
          branch="${{ inputs.manjaro_branch }}"
          servers=(irltoolkit.mm.fcix.net mirror.fcix.net opencolo.mm.fcix.net mirrors.ocf.berkeley.edu ridgewireless.mm.fcix.net codingflyboy.mm.fcix.net mirrors.sonic.net repo.ialab.dsu.edu volico.mm.fcix.net forksystems.mm.fcix.net mnvoip.mm.fcix.net coresite.mm.fcix.net uvermont.mm.fcix.net ohioix.mm.fcix.net southfront.mm.fcix.net nnenix.mm.fcix.net mirror.math.princeton.edu nocix.mm.fcix.net mirrors.gigenet.com ask4.mm.fcix.net)
          for server in "${servers[@]}"; do
            echo "Server = https://$server/manjaro/$branch/\$repo/\$arch" | sudo tee -a "$arquivo_conf"
          done

          # Configure os repositĂłrios Community
          case "${{ inputs.community_branch }}" in
            "stable")
              {
              echo '[biglinux-update-stable]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.biglinux.com.br/update-stable/$arch'
              echo
              echo '[community-stable]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.communitybig.org/stable/$arch'
              echo
              echo '[community-testing]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.communitybig.org/testing/$arch'
              echo
              echo '[community-extra]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.communitybig.org/extra/$arch'
              } | sudo tee -a "$arquivo_conf"
              ;;
            "testing")
              {
              echo '[community-testing]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.communitybig.org/testing/$arch'
              echo
              echo '[community-stable]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.communitybig.org/stable/$arch'
              echo
              echo '[community-extra]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.communitybig.org/extra/$arch'
              } | sudo tee -a "$arquivo_conf"
              ;;
          esac

          # Configure os repositĂłrios BigLinux
          case "${{ inputs.biglinux_branch }}" in
            "stable")
              {
              echo '[biglinux-stable]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.biglinux.com.br/stable/$arch'
              echo
              echo '[biglinux-testing]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.biglinux.com.br/testing/$arch'
              } | sudo tee -a "$arquivo_conf"
              ;;
            "testing")
              {
              echo '[biglinux-testing]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.biglinux.com.br/testing/$arch'
              echo
              echo '[biglinux-stable]'
              echo 'SigLevel = PackageRequired'
              echo 'Server = https://repo.biglinux.com.br/stable/$arch'
              } | sudo tee -a "$arquivo_conf"
              ;;
          esac
        }

        # Aplique as configuraĂ§Ăµes
        add_repository "$PATH_MANJARO_TOOLS/pacman-default.conf"
        add_repository "$PATH_MANJARO_TOOLS/pacman-multilib.conf"

        # Desabilite a remoĂ§ĂŁo do cache de pacotes
        sudo sed -i 's|path=$1/var/lib/pacman/sync|path=$1/usr/share/man|g' /usr/lib/manjaro-tools/util-iso-image.sh

        # ConfiguraĂ§Ăµes de compressĂŁo
        if [ "${{ inputs.community_branch }}" != "stable" ]; then
          sudo sed -i 's|-Xcompression-level 20|-Xcompression-level 6|g' /usr/lib/manjaro-tools/util-iso.sh
          sudo sed -i 's|256K|1024K|g' /usr/lib/manjaro-tools/util-iso.sh
        else
          sudo sed -i 's|256K|1024K|g' /usr/lib/manjaro-tools/util-iso.sh
        fi

        # Imprima as configuraĂ§Ăµes
        echo "print mirrorlist..."
        sudo cat /etc/pacman.d/mirrorlist
        echo ""
        echo "Print pacman-default"
        sudo cat $PATH_MANJARO_TOOLS/pacman-default.conf
        echo ""
        echo "Print pacman-multilib"
        sudo cat $PATH_MANJARO_TOOLS/pacman-multilib.conf

    - name: Checkout iso-profiles
      shell: bash
      run: |
        # Cloning ISO profiles repository
        REPO="${{ inputs.iso_profiles_repo }}"
        echo "Repository: $REPO"

        if ! git clone --depth 1 "$REPO" iso-profiles; then
          echo "Falha ao clonar o repositorio iso-profiles"
          exit 1
        fi
        # ativando 'git config --global --add safe.directory /__w/build-iso/build-iso/iso-profiles'
        git config --global --add safe.directory /__w/build-iso/build-iso/iso-profiles || true

        # Remove directory "/__t"
        sudo rm -rf /__t/* || true
        
    - name: Ajustar configuraĂ§Ăµes de kernels.cfg para bigcommunity em iso-profiles
      shell: bash
      run: |
        # Ajustar configuraĂ§Ăµes de kernels.cfg para bigcommunity
        find "$WORK_PATH_ISO_PROFILES" -name "kernels.cfg" -exec sed -i 's/misobasedir=manjaro/misobasedir=bigcommunity/g' {} + || true

    - name: Create with mknod /dev/sr0
      shell: bash
      run: |
        # Create with mknod /dev/sr0
        sudo mknod /dev/sr0 b 11 0 || true
        sudo chmod 660 /dev/sr0 || true
        sudo chown root:root /dev/sr0 || true

    - name: Setup TMATE Session
      uses: mxschmitt/action-tmate@v3
      if: inputs.tmate == 'true'
      with:
        install-dependencies: false
        detached: true

    - name: Build ISO Image
      shell: bash
      env:
        DISTRONAME: ${{ inputs.name || 'bigcommunity' }}
        EDITION: ${{ inputs.edition }}
        MANJAROBRANCH: ${{ inputs.manjaro_branch }}
        COMMUNITYBRANCH: ${{ inputs.community_branch }}
        BIGBRANCH: ${{ inputs.biglinux_branch }}
        SCOPE: ${{ inputs.scope }}
        KERNEL: ${{ inputs.kernel }}
        OFFICE: ${{ inputs.office-chooser }}
        RELEASE_TAG: ${{ inputs.release_tag }}
        PROFILE_PATH_EDITION: "$PROFILE_PATH/$EDITION"
      run: |

        # Check if iso-profiles directory exists before proceeding
        if [[ ! -d "iso-profiles" ]]; then
          echo "Error: iso-profiles directory not found in the current working directory."
          exit 1
        fi

        # Verificando o diretĂłrio do perfil especĂ­fico
        ls -la "$PROFILE_PATH/$EDITION"
        echo "Caminho completo do diretĂłrio do perfil: $PROFILE_PATH/$EDITION"

        # listando diretĂłrio iso-profiles no diretĂłrio atual
        ls -la "$PROFILE_PATH"

        add_big_cleanups() {
          local cleanup_script="/usr/lib/manjaro-tools/util-iso-image.sh"
          
          sudo tee -a "$cleanup_script" << 'EOF'
          
          # Big cleanups
          local path=$1
          
          # Remove documentation
          sudo rm -rf "$path/usr/share/doc"/* &> /dev/null
          
          # Remove man pages
          sudo rm -rf "$path/usr/share/man"/* &> /dev/null
          
          # Clean LibreOffice configs
          local libreoffice_path="$path/usr/lib/libreoffice/share/config"
          if [[ -d "$libreoffice_path" ]]; then
              sudo rm -f "$libreoffice_path"/images_{karasa_jaga,elementary,sukapura}* &> /dev/null
              sudo rm -f "$libreoffice_path"/images_{colibre,sifr_dark,sifr,breeze_dark,breeze}_svg.zip &> /dev/null
          fi
          # Clean wallpapers
          local wallpapers_path="$path/usr/share/wallpapers"
          if [[ -d "$wallpapers_path" ]]; then
              sudo rm -rf "$wallpapers_path"/{Altai,BytheWater,Cascade,ColdRipple,DarkestHour,EveningGlow,Flow,FlyingKonqui,IceCold,Kokkini,Next,Opal,Patak,SafeLanding,summer_1am,Autumn,Canopee,Cluster,ColorfulCups,Elarun,FallenLeaf,Fluent,Grey,Kite,MilkyWay,OneStandsOut,PastelHills,Path,Shell,Volna} &> /dev/null
          fi
        EOF
        }

        setup_manjaro_tools() {
          echo "Setting up Manjaro tools..."
          
          # remover pasta para nĂŁo ter duplicidade de perfil
          rm -rf "$WORK_PATH_ISO_PROFILES"/custom-profiles

          # Criar e configurar diretĂłrios
          sudo mkdir -p $VAR_CACHE_MANJARO_TOOLS_ISO
          sudo chmod 777 $VAR_CACHE_MANJARO_TOOLS_ISO
          
          # Verificar se buildiso estĂˇ disponĂ­vel
          if ! command -v buildiso &> /dev/null; then
              echo "Error: buildiso command not found. Please ensure manjaro-tools-iso is installed correctly."
              exit 1
          fi

          # Verificar se o diretĂłrio do perfil existe
          if [ ! -d "$PROFILE_PATH/$EDITION" ]; then
              echo "Error: Profile directory $PROFILE_PATH/$EDITION does not exist."
              exit 1
          fi
          
          # Apply Custom Profile Modifications
            # Apply edition-specific removals
            for remove_file in Root-remove Live-remove Mhwd-remove Desktop-remove; do
              if [[ -f "$PROFILE_PATH_EDITION/$remove_file" ]]; then
                target_file="$PROFILE_PATH_EDITION/Packages-${remove_file%-remove}"
                if [[ -f "$target_file" ]]; then
                  echo "Removing packages from $target_file"
                  while IFS= read -r package; do
                    sed -i "/^$package$/d" "$target_file"
                  done < "$PROFILE_PATH_EDITION/$remove_file"
                else
                  echo "Warning: $target_file does not exist. Skipping removals."
                fi
              else
                echo "Info: $remove_file not found in $PROFILE_PATH_EDITION. Skipping."
              fi
            done
            # Execute special commands if they exist
            if [[ -f "$PROFILE_PATH_EDITION/special-commands.sh" ]]; then
              bash "$PROFILE_PATH_EDITION/special-commands.sh"
            fi
            # END Apply Custom Profile Modifications

          # Configurar o nome da distribuiĂ§ĂŁo e ISO
          sudo sed -i 's|dist_name=\$(get_distname)|dist_name=BigCommunity|g' /usr/lib/manjaro-tools/util.sh
          sudo sed -i 's|iso_name=\$(get_osid)|iso_name=bigcommunity|g' /usr/lib/manjaro-tools/util.sh

          # Configurar a marca do BigCommunity
          sudo sed -i -e 's|dist_branding=.*|dist_branding="bigcommunity"|' /usr/lib/manjaro-tools/util.sh

          # Modificar o nome do arquivo ISO
          sudo sed -i 's|_${profile}${_edition}_${dist_release//.}|-live|' /usr/lib/manjaro-tools/util-iso.sh

          # Desabilitar a verificaĂ§ĂŁo de versĂŁo do kernel
          #sudo sed -i '/${iso_kernel}/s/^/#/' /usr/lib/manjaro-tools/util-iso.sh
          
          # Adicionar limpezas do Big
          add_big_cleanups

          # Adicionar root-overlay
          sudo sed -i '/copy_overlay "${profile_dir}\/root-overlay" "${path}"/a [[ -e ${profile_dir}\/root-overlay ]] && copy_overlay "${profile_dir}\/root-overlay" "${path}"' /usr/lib/manjaro-tools/util-iso.sh

          # Habilitar plymouth e kms
          sudo sed -i "s|keyboard keymap|keyboard keymap kms plymouth|g" $PATH_MANJARO_TOOLS/mkinitcpio.conf

          echo "Manjaro tools setup completed. Directory contents of $VAR_CACHE_MANJARO_TOOLS_ISO:"
          ls -la $VAR_CACHE_MANJARO_TOOLS_ISO
        }

        configure_mesa() {
          if [[ "$KERNEL" =~ ^(latest|xanmod)$ ]]; then
            {
            echo ""
            echo "mesa-tkg-stable"
            echo "lib32-mesa-tkg-stable"
            } | sudo tee -a $PROFILE_PATH/$EDITION/Packages-Root
            sudo sed -i '/libva-mesa/d; /vulkan-swrast/d' $PROFILE_PATH/$EDITION/Packages-{Desktop,Mhwd}
          fi
        }

        configure_kernel() {
          echo "Configuring kernel: $KERNEL"
          case "$KERNEL" in
            oldLts)
              KERNEL=$(curl -s https://www.kernel.org/feeds/kdist.xml | grep ": longterm" | sed 's/^.*<title>//' | sed 's/<\/title>.*$//' | cut -d ":" -f1 | rev | cut -d "." -f2,3 | rev | head -n2 | sed 's/\.//g' | tail -n1)
              ;;
            atualLts)
              KERNEL=$(curl -s https://www.kernel.org/feeds/kdist.xml | grep ": longterm" | sed 's/^.*<title>//' | sed 's/<\/title>.*$//' | cut -d ":" -f1 | rev | cut -d "." -f2,3 | rev | head -n1 | sed 's/\.//g')
              ;;
            latest)
              KERNEL=$(curl -s https://raw.githubusercontent.com/biglinux/linux-latest/stable/PKGBUILD | awk -F= '/kernelver=/{print $2}')
              ;;
            xanmod*)
              KERNEL="-${KERNEL}"
              ;;
          esac
            
          echo "KERNEL set to: $KERNEL"

          # Limpar kernels anteriores de todos os Packages-*, mas manter linux-firmware
          for pkg_file in "$PROFILE_PATH/$EDITION"/Packages-*; do
            sudo sed -i '/^linux[0-9]/d' "$pkg_file"
            sudo sed -i '/^linux-latest/d' "$pkg_file"
          done
            
          # Definir KERNEL_NAME e adicionar linux-firmware se necessĂˇrio
          if [[ "$KERNEL" == "-xanmod"* ]]; then
            KERNEL_NAME="${KERNEL#-}"
            # Adicionar linux-firmware ao Packages-Root
            echo "linux-firmware" | sudo tee -a "$PROFILE_PATH/$EDITION/Packages-Root"
          elif [[ "$KERNEL" == "latest" ]]; then
            KERNEL_NAME="latest"
          else
            KERNEL_NAME="$KERNEL"
          fi

          # Criar KERNEL_VERSION_DOT
          if [[ "$KERNEL_NAME" =~ ^[0-9]+$ ]]; then
            if [[ ${#KERNEL_NAME} -eq 3 ]]; then
              KERNEL_VERSION_DOT="${KERNEL_NAME:0:1}.${KERNEL_NAME:1:2}"
            elif [[ ${#KERNEL_NAME} -eq 2 ]]; then
              KERNEL_VERSION_DOT="${KERNEL_NAME:0:1}.${KERNEL_NAME:1:1}"
            else
              KERNEL_VERSION_DOT="$KERNEL_NAME"
            fi
          else
            KERNEL_VERSION_DOT="$KERNEL_NAME"
          fi

          echo "KERNEL_VERSION_DOT set to: $KERNEL_VERSION_DOT"
            
          # Modificar a funĂ§ĂŁo prepare_boot_extras em util-iso-boot.sh
          sudo sed -i "/prepare_boot_extras()/,/^}/c\\
          prepare_boot_extras(){\\
              mkdir -p \"\$2\"\\
              cp \$1/boot/amd-ucode.img \$2/amd_ucode.img\\
              cp \$1/boot/intel-ucode.img \$2/intel_ucode.img\\
              cp \$1/usr/share/licenses/amd-ucode/LIC* \$2/amd_ucode.LICENSE\\
              cp \$1/usr/share/licenses/intel-ucode/LIC* \$2/intel_ucode.LICENSE\\
              cp \$1/boot/memtest86+/memtest.bin \$2/memtest\\
              local kernel_file=\$(ls \$1/boot/vmlinuz-${KERNEL_VERSION_DOT}-* 2>/dev/null || ls \$1/boot/vmlinuz-*-${KERNEL_VERSION_DOT}* 2>/dev/null)\\
              if [ -n \"\$kernel_file\" ]; then\\
                  cp \"\$kernel_file\" \$2/vmlinuz-x86_64\\
                  echo \"Kernel copied: \$kernel_file -> \$2/vmlinuz-x86_64\"\\
              else\\
                  echo \"Error: Kernel file not found for KERNEL_VERSION_DOT=${KERNEL_VERSION_DOT}\"\\
                  ls -l \$1/boot/\\
              fi\\
          }" /usr/lib/manjaro-tools/util-iso-boot.sh
            
          echo "KERNEL_NAME set to: $KERNEL_NAME"
          
          # Substituir KERNEL pelos pacotes de kernel especĂ­ficos em todos os Packages-*
          for pkg_file in "$PROFILE_PATH/$EDITION"/Packages-*; do
            sudo sed -i "s/^KERNEL\b/linux${KERNEL_NAME}/g" "$pkg_file"
            sudo sed -i "s/^KERNEL-headers\b/linux${KERNEL_NAME}-headers/g" "$pkg_file"
            sudo sed -i "s/^KERNEL-\(.*\)/linux${KERNEL_NAME}-\1/g" "$pkg_file"
          done
            
          echo "ConteĂşdo dos arquivos Packages apĂłs a limpeza e substituiĂ§ĂŁo do kernel:"
          for pkg_file in "$PROFILE_PATH/$EDITION"/Packages-*; do
            echo "### $pkg_file ###"
            sudo cat "$pkg_file"
            echo ""
          done
        }

        configure_repos() {
          local config_file=$1
          local community_branch=$2
          local biglinux_branch=$3

          # Backup the original file
          sudo cp "$config_file" "${config_file}.bak"

          # Remove existing Community and BigLinux repositories
          sudo sed -i '/\[community-.*\]/,/^$/d' "$config_file"
          sudo sed -i '/\[biglinux-.*\]/,/^$/d' "$config_file"

          # Add repositories based on the branch
          {
            echo ""
            echo "[community-${community_branch}]"
            echo "SigLevel = PackageRequired"
            echo "Server = https://repo.communitybig.org/${community_branch}/\$arch"
            echo ""
            echo "[community-stable]"
            echo "SigLevel = PackageRequired"
            echo "Server = https://repo.communitybig.org/stable/\$arch"
            echo ""
            echo "[community-extra]"
            echo "SigLevel = PackageRequired"
            echo "Server = https://repo.communitybig.org/extra/\$arch"
            echo ""
            echo "[biglinux-${biglinux_branch}]"
            echo "SigLevel = PackageRequired"
            echo "Server = https://repo.biglinux.com.br/${biglinux_branch}/\$arch"
          } | sudo tee -a "$config_file"

          # If biglinux branch is testing, add the stable repo as well
          if [[ "$biglinux_branch" == "testing" ]]; then
            {
              echo ""
              echo "[biglinux-stable]"
              echo "SigLevel = PackageRequired"
              echo "Server = https://repo.biglinux.com.br/stable/\$arch"
            } | sudo tee -a "$config_file"
          fi

          # Exibir o conteĂşdo do arquivo de configuraĂ§ĂŁo apĂłs as modificaĂ§Ăµes
          echo "ConteĂşdo do arquivo $config_file apĂłs as modificaĂ§Ăµes:"
          sudo cat "$config_file"
        }

        set_build_info() {
          local release_file="$PROFILE_PATH/$EDITION/root-overlay/etc/big-release"
          local release_dir=$(dirname "$release_file")

          # Ensure the directory exists
          sudo mkdir -p "$release_dir"

          {
            echo "BUILD_RELEASE=$RELEASE_TAG"
            echo "BUILD_BRANCH=$BIGBRANCH"
            echo "UNIX_TIMESTAMP=$(( $(date +%s) / 86400 ))"
            echo "BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } | sudo tee "$release_file"

          echo "Build info written to $release_file"
          sudo cat "$release_file"
        }

        configure_iso_name() {
          echo "Debug: DISTRONAME=$DISTRONAME"
          echo "Debug: MANJAROBRANCH=$MANJAROBRANCH"
          echo "Debug: COMMUNITYBRANCH=$COMMUNITYBRANCH"
          
          # Use $DISTRONAME aqui tambĂ©m, em vez de "bigcommunity"
          sudo sed -i "s/label=.*/label=${DISTRONAME}_$RELEASE_TAG.iso/" $PROFILE_PATH/"$EDITION"/profile.conf
          
          case "$MANJAROBRANCH/$COMMUNITYBRANCH" in
            stable/stable) ISO_BASENAME="${DISTRONAME}_STABLE_${EDITION}_${RELEASE_TAG%%_*}_k${KERNEL}.iso" ;;
            stable/testing|testing/*) ISO_BASENAME="${DISTRONAME}_BETA_${EDITION}_${RELEASE_TAG%%_*}_k${KERNEL}.iso" ;;
            unstable/*) ISO_BASENAME="${DISTRONAME}_DEVELOPMENT_${EDITION}_${RELEASE_TAG%%_*}_k${KERNEL}.iso" ;;
          esac

          echo "ISO_BASENAME set to: $ISO_BASENAME"
          echo "Content of $PROFILE_PATH/$EDITION/profile.conf:"
          sudo cat $PROFILE_PATH/"$EDITION"/profile.conf
        }

        build_iso() {
          echo "###################################################################"
          echo "BUILD COMMAND            : buildiso ${SCOPE:+-f} -p $PROFILE_PATH/$EDITION -b $MANJAROBRANCH -k linux${KERNEL_NAME} ${OFFICE:+-o}"
          echo "Building ISO with kernel : linux${KERNEL_NAME}"
          echo "PROFILE_PATH             : $PROFILE_PATH"
          echo "EDITION                  : $EDITION"
          echo "MANJAROBRANCH            : $MANJAROBRANCH"
          echo "KERNEL_NAME              : $KERNEL_NAME"
          echo "SCOPE                    : $SCOPE"
          echo "OFFICE                   : $OFFICE"
          echo "###################################################################"
          
          # Remover iso-profiles em $PATH_MANJARO_ISO_PROFILES
          sudo rm -rf $PATH_MANJARO_ISO_PROFILES || true
          
          # Criar link simbĂłlico para /__w/build-iso/build-iso/iso-profiles
          sudo ln -sf $WORK_PATH_ISO_PROFILES $PATH_MANJARO_ISO_PROFILES || true
          
          # Habilitar safe.directory
          git config --global --add safe.directory $PATH_MANJARO_ISO_PROFILES || true

          # Executar buildiso e capturar o cĂłdigo de saĂ­da
          sudo buildiso "${SCOPE:+-f}" -p "$EDITION" -b "$MANJAROBRANCH" -k "linux${KERNEL_NAME}" "${OFFICE:+-o}"
          BUILD_EXIT_CODE=$?

          # Verificar arquivos de kernel e tentar cĂłpia manual, independentemente do resultado do buildiso
          echo "Checking kernel files in rootfs:"
          sudo find /var/lib/manjaro-tools/buildiso/${EDITION}/x86_64/rootfs/boot -name "vmlinuz*"
          
          echo "Checking kernel files in iso/boot:"
          sudo find /var/lib/manjaro-tools/buildiso/${EDITION}/iso/boot -name "vmlinuz*"
          
          if ! sudo test -f "/var/lib/manjaro-tools/buildiso/${EDITION}/iso/boot/vmlinuz*"; then
            echo "Warning: Kernel file not found in iso/boot. Attempting manual copy..."
            sudo mkdir -p "/var/lib/manjaro-tools/buildiso/${EDITION}/iso/boot"
            sudo cp /var/lib/manjaro-tools/buildiso/${EDITION}/x86_64/rootfs/boot/vmlinuz* "/var/lib/manjaro-tools/buildiso/${EDITION}/iso/boot/" || echo "Manual copy failed"
          fi

          # Exibir conteĂşdo de diretĂłrios relevantes para diagnĂłstico
          echo "Contents of /var/lib/manjaro-tools/buildiso/${EDITION}/x86_64/rootfs/boot:"
          sudo ls -la /var/lib/manjaro-tools/buildiso/${EDITION}/x86_64/rootfs/boot
          
          echo "Contents of /var/lib/manjaro-tools/buildiso/${EDITION}/iso/boot:"
          sudo ls -la /var/lib/manjaro-tools/buildiso/${EDITION}/iso/boot

          # Se buildiso falhou, sair com o cĂłdigo de erro
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "Error: buildiso command failed with exit code $BUILD_EXIT_CODE"
            exit $BUILD_EXIT_CODE
          fi
        }

        cleanup_and_move_files() {
          OUTPUT_ISO_PATH_NAME=$(sudo find $VAR_CACHE_MANJARO_TOOLS_ISO -type f -name "*.iso" -exec stat -c '%Y %n' {} + | sort -nr | awk 'NR==1 {print $2}')
          FILE_PKG=$(sudo find $VAR_CACHE_MANJARO_TOOLS_ISO -type f -name "*-pkgs.txt" -exec stat -c '%Y %n' {} + | sort -nr | awk 'NR==1 {print $2}')
          
          echo "ISO_BASENAME=$ISO_BASENAME" >> "$GITHUB_ENV"  # Exporta ISO_BASENAME para outras etapas

          echo "ISO_BASENAME=$ISO_BASENAME"
          echo "FILE_PKG=$FILE_PKG"

          sudo mv -fv "$OUTPUT_ISO_PATH_NAME" "$WORK_PATH/$ISO_BASENAME" || echo "Failed to move ISO file"           
          sudo mv -fv "$FILE_PKG" "$WORK_PATH/${ISO_BASENAME}.pkgs" || echo "Failed to move pkgs file"

          # Ajustar permissĂµes dos arquivos movidos
          sudo chown $USER:$USER "$WORK_PATH/$ISO_BASENAME" "$WORK_PATH/${ISO_BASENAME}.pkgs"
        }

        main() {
          # Community Pre Config Build ISO"
          setup_manjaro_tools
          configure_mesa
          # END Community Pre Config Build ISO"

          # Starting kernel configuration
          configure_kernel
          # END Kernel configuration completed"

          # Configure repositories
          echo "Configuring repositories"
          configure_repos "/etc/pacman.conf" "$COMMUNITYBRANCH" "$BIGBRANCH"

          # Copy the pacman configuration to the live and root environments
          sudo cp /etc/pacman.conf "$PROFILE_PATH/$EDITION/live-overlay/etc/pacman.conf"
          sudo cp /etc/pacman.conf "$PROFILE_PATH/$EDITION/root-overlay/etc/pacman.conf"
          # END Repository configuration complete

          set_build_info
          configure_iso_name

          echo
          echo "Kernel            : $KERNEL_NAME"
          echo "Edition           : $EDITION"
          echo "ManjaroBranch     : $MANJAROBRANCH"
          echo "CommunityBranch   : $COMMUNITYBRANCH"
          echo "BigLinuxBranch    : $BIGBRANCH"
          echo "ISO profiles path : $PROFILE_PATH/$EDITION"
          echo

          build_iso
          cleanup_and_move_files
          ls -la
        }
        main

    - name: Set ISO path
      shell: bash
      run: |
        echo "ISO_PATH=$WORK_PATH/$ISO_BASENAME" >> $GITHUB_ENV
