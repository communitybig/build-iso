name: "Build BigCommunity ISO"
description: "Builds a BigCommunity ISO image"

inputs:
  name:
    description: "Name for the ISO"
    required: true
  iso_profiles_repo:
    description: "ISO profiles repository to clone"
    required: false
    default: "https://github.com/talesam/iso-profiles"
  iso_profiles_branch:
    description: "Branch of the ISO profiles repository (optional)"
    required: false
  edition:
    description: "Name of the ISO profile to build"
    required: true
  manjaro_branch:
    description: "Manjaro branch (stable, testing, unstable)"
    required: true
    default: stable
  community_branch:
    description: "Community branch (stable, testing)"
    required: true
  biglinux_branch:
    description: "BigLinux branch (stable, testing)"
    required: true
  scope:
    description: "Build scope (full or minimal)"
    required: false
    default: "full"
  kernel:
    description: "Kernel version (latest, lts, oldLts)"
    required: true
  release_tag:
    description: "Release tag for the ISO"
    required: true
  tmate:
    description: "Enable debugging with tmate"
    required: false
    default: "false"
  office-chooser:
    description: "Include office suite"
    required: false
    default: "false"
  repo_unstable:
    description: "URL for unstable repository"
    required: false
  mirror_dev:
    description: "URL for development mirror"
    required: false
  mirror_unstable:
    description: "URL for unstable BigCommunity mirror"
    required: false
  github_token:
    description: "GitHub token for authentication"
    required: true

outputs:
  iso_path:
    description: "Path to the generated ISO file"
    value: ${{ steps.build.outputs.iso_path }}
  release_name:
    description: "Name of the release"
    value: ${{ steps.prepare-iso.outputs.release_name }}

runs:
  using: "composite"
  steps:
    - name: Setup build environment
      shell: bash
      run: |
        echo "Setting up build environment..."
        # Setup build environment
        # atualizar e instalar pacotes adicionais
        sudo pacman -Syu --quiet --needed --noconfirm \
          mktorrent \
          squashfs-tools \
          archiso \
          manjaro-tools \
          manjaro-tools-iso \
          calamares \
          calamares-tools \
          tree \
          duf \
          mkinitcpio > /dev/null

    - name: Ajuste nos hooks do mkinitcpio
      shell: bash
      run: |
        # Ajuste nos hooks do mkinitcpio (se ainda necessário)
        sudo sed -i -e 's|File|Path|' /usr/share/libalpm/hooks/*hook*

    - name: Configure the environment for the root user
      shell: bash
      run: |
        # Configurar o ambiente para o usuário root
        mkdir -p /root/.config/manjaro-tools
        echo 'PACKAGER="Community Package/ISO Build <talesam@gmail.com>"' >> /root/.makepkg.conf
        echo "run_dir=/__w/build-iso/build-iso/iso-profiles" > /root/.config/manjaro-tools/iso-profiles.conf
        git config --global --add safe.directory /__w/build-iso/build-iso/iso-profiles

    - name: Additional configurations specific to ISO building
      shell: bash
      run: |
        # Configurações adicionais específicas para a construção de ISO
        sudo sed -i 's|dist_name=\$(get_distname)|dist_name=BigCommunity|g' /usr/lib/manjaro-tools/util.sh
        sudo sed -i 's|iso_name=\$(get_osid)|iso_name=bigcommunity|g' /usr/lib/manjaro-tools/util.sh

    - name: Configure disable-fsync
      shell: bash
      run: |
        echo "Configuring disable-fsync..."
        DISABLE_FSYNC_URL="https://raw.githubusercontent.com/biglinux/disable-fsync/main/disable-fsync/usr/lib/disable-fsync.so"
        DISABLE_FSYNC_FILE="/usr/lib/disable-fsync.so"
        PRELOAD_FILE="/etc/ld.so.preload"

        sudo wget "$DISABLE_FSYNC_URL" -O "$DISABLE_FSYNC_FILE"
        SHA256SUM=$(curl -s "$DISABLE_FSYNC_URL" | sha256sum | awk '{print $1}')
        echo "${SHA256SUM} ${DISABLE_FSYNC_FILE}" | sha256sum --check || exit 1

        sudo sh -c "echo '${DISABLE_FSYNC_FILE}' >> '${PRELOAD_FILE}'"
        sudo ldconfig

    - name: Pull and setup Community keys
      shell: bash
      run: |
        # Pulling and installing Community keys...
        sudo git clone https://github.com/biglinux/biglinux-key.git
        sudo install -dm755 /etc/pacman.d/gnupg/
        sudo install -m0644 biglinux-key/usr/share/pacman/keyrings/* /etc/pacman.d/gnupg/
        sudo rm -r biglinux-key

        # Inicializar o chaveiro do pacman, se necessário
        sudo pacman-key --init

        # Receber e assinar a chave do Community
        sudo pacman-key --recv-keys AECEEE84E52BBFAA9F1C9DF01EA0CEEEB09B44A3
        sudo pacman-key --lsign-key AECEEE84E52BBFAA9F1C9DF01EA0CEEEB09B44A3

        # Atualizar os bancos de dados do pacman
        sudo pacman -Sy --quiet

    - name: Configure repositories and build environment
      shell: bash
      run: |
        # Configuring repositories and build environment...

        # Função para adicionar repositórios
        add_repository() {
          local arquivo_conf=$1

          # Adicione o repositório community-keyring
          if ! grep -q 'community-keyring' "$arquivo_conf"; then
            sudo sed -i '/SyncFirst/s/$/ community-keyring/' "$arquivo_conf"
          fi

          # Adicione o repositório biglinux-keyring
          if ! grep -q 'biglinux-keyring' "$arquivo_conf"; then
            sudo sed -i '/SyncFirst/s/$/ biglinux-keyring/' "$arquivo_conf"
          fi

          # Adicione o repositório biglinux-update-stable
          if ! grep -q 'biglinux-update-stable' "$arquivo_conf"; then
            sudo sed -i '/\[core\]/{x;/^$/!{x;H;};/^$/p;x;}' "$arquivo_conf"
            echo '[biglinux-update-stable]
            SigLevel = PackageRequired
            Server = https://repo.biglinux.com.br/update-stable/$arch' | sudo tee -a "$arquivo_conf"
          fi

          # Configure os repositórios Manjaro
          branch="${{ inputs.manjaro_branch }}"
          servers=(irltoolkit.mm.fcix.net mirror.fcix.net opencolo.mm.fcix.net mirrors.ocf.berkeley.edu ridgewireless.mm.fcix.net codingflyboy.mm.fcix.net mirrors.sonic.net repo.ialab.dsu.edu volico.mm.fcix.net forksystems.mm.fcix.net mnvoip.mm.fcix.net coresite.mm.fcix.net uvermont.mm.fcix.net ohioix.mm.fcix.net southfront.mm.fcix.net nnenix.mm.fcix.net mirror.math.princeton.edu nocix.mm.fcix.net mirrors.gigenet.com ask4.mm.fcix.net)
          for server in "${servers[@]}"; do
            echo "Server = https://$server/manjaro/$branch/\$repo/\$arch" | sudo tee -a "$arquivo_conf"
          done

          # Configure os repositórios Community
          case "${{ inputs.community_branch }}" in
            "stable")
              echo '[community-stable]
              SigLevel = PackageRequired
              Server = https://repo.communitybig.org/stable/$arch' | sudo tee -a "$arquivo_conf"
              ;;
            "testing")
              echo '[community-testing]
              SigLevel = PackageRequired
              Server = https://repo.communitybig.org/testing/$arch' | sudo tee -a "$arquivo_conf"
              echo '[community-stable]
              SigLevel = PackageRequired
              Server = https://repo.communitybig.org/stable/$arch' | sudo tee -a "$arquivo_conf"
              ;;
          esac

          # Configure os repositórios BigLinux
          case "${{ inputs.biglinux_branch }}" in
            "stable")
              echo '[biglinux-stable]
              SigLevel = PackageRequired
              Server = https://repo.biglinux.com.br/stable/$arch' | sudo tee -a "$arquivo_conf"
              ;;
            "testing")
              echo '[biglinux-testing]
              SigLevel = PackageRequired
              Server = https://repo.biglinux.com.br/testing/$arch' | sudo tee -a "$arquivo_conf"
              echo '[biglinux-stable]
              SigLevel = PackageRequired
              Server = https://repo.biglinux.com.br/stable/$arch' | sudo tee -a "$arquivo_conf"
              ;;
          esac
        }

        # Aplique as configurações
        add_repository "/usr/share/manjaro-tools/pacman-default.conf"
        add_repository "/usr/share/manjaro-tools/pacman-multilib.conf"

        # Desabilite a remoção do cache de pacotes
        sudo sed -i 's|path=$1/var/lib/pacman/sync|path=$1/usr/share/man|g' /usr/lib/manjaro-tools/util-iso-image.sh

        # Configurações de compressão
        if [ "${{ inputs.community_branch }}" != "stable" ]; then
          sudo sed -i 's|-Xcompression-level 20|-Xcompression-level 6|g' /usr/lib/manjaro-tools/util-iso.sh
          sudo sed -i 's|256K|1024K|g' /usr/lib/manjaro-tools/util-iso.sh
        else
          sudo sed -i 's|256K|1024K|g' /usr/lib/manjaro-tools/util-iso.sh
        fi

        # Imprima as configurações
        echo "print mirrorlist..."
        cat /etc/pacman.d/mirrorlist
        echo ""
        echo "Print pacman-default"
        cat /usr/share/manjaro-tools/pacman-default.conf
        echo ""
        echo "Print pacman-multilib"
        cat /usr/share/manjaro-tools/pacman-multilib.conf

        echo "Repository and build environment configuration completed."

    - name: Checkout iso-profiles
      shell: bash
      run: |
        # Cloning ISO profiles repository
        REPO="${{ inputs.iso_profiles_repo }}"
        if ! git clone --depth 1 "$REPO" iso-profiles; then
          echo "Falha ao clonar o repositorio iso-profiles"
          exit 1
        fi
        git config --global --add safe.directory /__w/build-iso/build-iso/iso-profiles || true
        sudo rm -rf /usr/share/manjaro-tools/iso-profiles || true

    - name: Create with mknod /dev/sr0
      shell: bash
      run: |
        # Create with mknod /dev/sr0
        sudo mknod /dev/sr0 b 11 0 || true
        sudo chmod 660 /dev/sr0 || true
        sudo chown root:root /dev/sr0 || true

    - name: Apply Custom Profile Modifications
      shell: bash
      run: |
        # BEGIN Apply Custom Profile Modifications
        EDITION="${{ inputs.edition }}"
        ISO_PROFILE_DIR="iso-profiles/community/$EDITION"
        CUSTOM_PROFILE_DIR="iso-profiles/custom-profiles/$EDITION"

        # Apply edition-specific removals
        for remove_file in Root-remove Live-remove Mhwd-remove Desktop-remove; do
          if [ -f "$CUSTOM_PROFILE_DIR/$remove_file" ]; then
            target_file="$ISO_PROFILE_DIR/Packages-${remove_file%-remove}"
            if [ -f "$target_file" ]; then
              echo "Removing packages from $target_file"
              while IFS= read -r package
              do
                sed -i "/^$package$/d" "$target_file"
              done < "$CUSTOM_PROFILE_DIR/$remove_file"
            else
              echo "Warning: $target_file does not exist. Skipping removals."
            fi
          else
            echo "Info: $remove_file not found in $CUSTOM_PROFILE_DIR. Skipping."
          fi
        done

        # Execute special commands if they exist
        if [ -f "$CUSTOM_PROFILE_DIR/special-commands.sh" ]; then
          bash "$CUSTOM_PROFILE_DIR/special-commands.sh"
        fi

    - name: Setup TMATE Session
      uses: mxschmitt/action-tmate@v3
      if: inputs.tmate == 'true'
      with:
        install-dependencies: false

    - name: Build ISO Image
      shell: bash
      env:
        NAME: ${{ inputs.name }}
        EDITION: ${{ inputs.edition }}
        MANJAROBRANCH: ${{ inputs.manjaro_branch }}
        COMMUNITYBRANCH: ${{ inputs.community_branch }}
        BIGBRANCH: ${{ inputs.biglinux_branch }}
        SCOPE: ${{ inputs.scope }}
        KERNEL: ${{ inputs.kernel }}
        OFFICE: ${{ inputs.office-chooser }}
        RELEASE_TAG: ${{ inputs.release_tag }}
      run: |
        # Denine path for directory
        PROFILE_PATH="iso-profiles/community"

        # Verificação inicial
        if [ ! -d "iso-profiles" ]; then
          echo "Error: iso-profiles directory not found in the current working directory."
          exit 1
        fi

        # Verificação, debugging
        echo "Verificando o diretório iso-profiles no diretório atual:"
        ls -la iso-profiles

        echo "Verificando o diretório do perfil específico:"
        ls -la "$PROFILE_PATH/$EDITION"

        echo "Caminho completo do diretório do perfil: $(pwd)/$PROFILE_PATH/$EDITION"

        #Check if iso-profiles directory exists before proceeding
        if [ ! -d "iso-profiles" ]; then
          echo "Error: iso-profiles directory not found in the current working directory."
          exit 1
        fi

        add_big_cleanups() {
          local cleanup_script="/usr/lib/manjaro-tools/util-iso-image.sh"
          sudo tee -a "$cleanup_script" > /dev/null << 'EOF'
          # Big cleanups
          local path=$1
          # Remove documentation
          rm -rf "$path/usr/share/doc"/* 2> /dev/null
          # Remove man pages
          rm -rf "$path/usr/share/man"/* 2> /dev/null
          # Clean LibreOffice configs
          local libreoffice_path="$path/usr/lib/libreoffice/share/config"
          if [[ -d "$libreoffice_path" ]]; then
              rm -f "$libreoffice_path"/images_{karasa_jaga,elementary,sukapura}* 2> /dev/null
              rm -f "$libreoffice_path"/images_{colibre,sifr_dark,sifr,breeze_dark,breeze}_svg.zip 2> /dev/null
          fi
          # Clean wallpapers
          local wallpapers_path="$path/usr/share/wallpapers"
          if [[ -d "$wallpapers_path" ]]; then
              rm -rf "$wallpapers_path"/{Altai,BytheWater,Cascade,ColdRipple,DarkestHour,EveningGlow,Flow,FlyingKonqui,IceCold,Kokkini,Next,Opal,Patak,SafeLanding,summer_1am,Autumn,Canopee,Cluster,ColorfulCups,Elarun,FallenLeaf,Fluent,Grey,Kite,MilkyWay,OneStandsOut,PastelHills,Path,Shell,Volna}
          fi
        EOF
        }

        setup_manjaro_tools() {
          echo "Setting up Manjaro tools..."

          # Criar e configurar diretórios
          sudo mkdir -p /var/cache/manjaro-tools/iso
          sudo chmod 777 /var/cache/manjaro-tools/iso

          # Verificar se o diretório do perfil existe
          if [ ! -d "$PROFILE_PATH/$EDITION" ]; then
              echo "Error: Profile directory $PROFILE_PATH/$EDITION does not exist."
              exit 1
          fi

          # Configurar o nome da distribuição e ISO
          sudo sed -i 's|dist_name=\$(get_distname)|dist_name=BigCommunity|g' /usr/lib/manjaro-tools/util.sh
          sudo sed -i 's|iso_name=\$(get_osid)|iso_name=bigcommunity|g' /usr/lib/manjaro-tools/util.sh

          # Configurar a marca do BigCommunity
          sudo sed -i -e 's|dist_branding=.*|dist_branding="bigcommunity"|' /usr/lib/manjaro-tools/util.sh

          # Modificar o nome do arquivo ISO
          sudo sed -i 's|_${profile}${_edition}_${dist_release//.}|-live|' /usr/lib/manjaro-tools/util-iso.sh

          # Modificar a busca por versões de kernel
          sudo sed -i '/_kernver=/s/_kernver=.*/_kernver=$(find $1\/usr\/lib\/modules\/ -type f -name version -exec cat {} +)/' /usr/lib/manjaro-tools/util-iso-boot.sh

          # Desabilitar a verificação de versão do kernel
          sudo sed -i '/${iso_kernel}/s/^/#/' /usr/lib/manjaro-tools/util-iso.sh

          # Adicionar limpezas do Big
          add_big_cleanups

          # Adicionar root-overlay
          sudo sed -i '/copy_overlay "${profile_dir}\/root-overlay" "${path}"/a [[ -e ${profile_dir}\/root-overlay ]] && copy_overlay "${profile_dir}\/root-overlay" "${path}"' /usr/lib/manjaro-tools/util-iso.sh

          # Habilitar plymouth e kms
          sudo sed -i "s|keyboard keymap|keyboard keymap kms plymouth|g" /usr/share/manjaro-tools/mkinitcpio.conf

          echo "Manjaro tools setup completed. Directory contents of /var/cache/manjaro-tools/iso:"
          ls -la /var/cache/manjaro-tools/iso
        }

        configure_mesa() {
          if [[ "$KERNEL" =~ ^(latest|xanmod)$ ]]; then
              echo -e "mesa-tkg-stable\nlib32-mesa-tkg-stable" | sudo tee -a $PROFILE_PATH/$EDITION/Packages-Root
              sudo sed -i '/libva-mesa/d; /vulkan-swrast/d' $PROFILE_PATH/$EDITION/Packages-{Desktop,Mhwd}
          fi
        }

        configure_kernel() {
          case "$KERNEL" in
            oldLts)
              KERNEL=$(curl -s https://www.kernel.org/feeds/kdist.xml | grep ": longterm" | sed -n 's/.*<title>\(.*\):.*/\1/p' | sort -Vr | sed -n '2s/\.//gp')
              ;;
            atualLts)
              KERNEL=$(curl -s https://www.kernel.org/feeds/kdist.xml | grep ": longterm" | sed -n 's/.*<title>\(.*\):.*/\1/p' | sort -Vr | sed -n '1s/\.//gp')
              ;;
            latest)
              KERNEL=$(curl -s https://raw.githubusercontent.com/biglinux/linux-latest/stable/PKGBUILD | awk -F= '/kernelver=/{print $2}')
              echo "linux-latest" | sudo tee -a $PROFILE_PATH/$EDITION/Packages-Root
              ;;
            xanmod*)
              echo "linux-firmware" | sudo tee -a $PROFILE_PATH/$EDITION/Packages-Root
              KERNEL="-${KERNEL}"
              echo "Configurando kernel xanmod: $KERNEL"
              ;;
          esac
          
          # Definir KERNEL_NAME
          if [ "$KERNEL" != "xanmod" ]; then
            KERNEL_NAME="${KERNEL}"
          else
            local xan_ver
            xan_ver=$(grep linux-xanmod "$(find /var/cache/manjaro-tools/iso -type f -name "*-pkgs.txt" -exec stat -c '%Y %n' {} \; | sort -nr | awk 'NR==1 {print $2}')" | grep -v headers | cut -d " " -f2 | cut -d "-" -f1 | sed ':a;$!{N;ba;};s/\(.*\)\..*/\1/' | sed 's/\.//')
            KERNEL_NAME="${KERNEL//-/}${xan_ver}"
          fi
          echo "KERNEL_NAME definido como: $KERNEL_NAME"
        }

        configure_repos() {
          local config_file=$1
          local community_branch=$2
          local biglinux_branch=$3
          
          # Community repositories
          echo "[community-${community_branch}]
          SigLevel = PackageRequired
          Server = https://repo.communitybig.org/${community_branch}/\$arch" | sudo tee -a "$config_file"
          
          if [ "$community_branch" = "testing" ]; then
            echo "[community-stable]
            SigLevel = PackageRequired
            Server = https://repo.communitybig.org/stable/\$arch" | sudo tee -a "$config_file"
          fi
          
          # BigLinux repositories
          echo "[biglinux-${biglinux_branch}]
          SigLevel = PackageRequired
          Server = https://repo.biglinux.com.br/${biglinux_branch}/\$arch" | sudo tee -a "$config_file"
          
          if [ "$biglinux_branch" = "testing" ]; then
            echo "[biglinux-stable]
            SigLevel = PackageRequired
            Server = https://repo.biglinux.com.br/stable/\$arch" | sudo tee -a "$config_file"
          fi
        }

        set_build_info() {
          echo "BUILD_RELEASE=$RELEASE_TAG" | sudo tee -a $PROFILE_PATH/"$EDITION"/root-overlay/etc/big-release
          echo "BUILD_BRANCH=$BIGBRANCH" | sudo tee -a $PROFILE_PATH/"$EDITION"/root-overlay/etc/big-release
          echo "UNIX_TIMESTAMP=$(( $(date +%s) / 86400 ))" | sudo tee -a $PROFILE_PATH/"$EDITION"/root-overlay/etc/big-release
        }

        configure_iso_name() {
          sudo sed -i "s/label=.*/label=bigcommunity_$RELEASE_TAG.iso/" $PROFILE_PATH/"$EDITION"/profile.conf
          
          case "$MANJAROBRANCH/$COMMUNITYBRANCH" in
            stable/stable) TARGET_ISO_PATH="${NAME}_STABLE_${EDITION}_${RELEASE_TAG%%_*}_k${KERNEL}.iso" ;;
            stable/testing|testing/*) TARGET_ISO_PATH="${NAME}_BETA_${EDITION}_${RELEASE_TAG%%_*}_k${KERNEL}.iso" ;;
            unstable/*) TARGET_ISO_PATH="${NAME}_DEVELOPMENT_${EDITION}_${RELEASE_TAG%%_*}_k${KERNEL}.iso" ;;
          esac
        }

        build_iso() {
          local kernel_name
          
          if [ "$KERNEL" != "xanmod" ]; then
            kernel_name="${KERNEL}"
          else
            local xan_ver
            xan_ver=$(grep linux-xanmod "$(find /var/cache/manjaro-tools/iso -type f -name "*-pkgs.txt" -exec stat -c '%Y %n' {} \; | sort -nr | awk 'NR==1 {print $2}')" | grep -v headers | cut -d " " -f2 | cut -d "-" -f1 | sed ':a;$!{N;ba;};s/\(.*\)\..*/\1/' | sed 's/\.//')
            kernel_name="${KERNEL//-/}${xan_ver}"
          fi
          
          echo "Build command: buildiso ${SCOPE:+-f} -p \"$EDITION\" -b \"$MANJAROBRANCH\" -k \"linux${kernel_name}\" ${OFFICE:+-o}"
          
          echo "Building ISO with kernel: linux${kernel_name}"
          echo "PROFILE_PATH = $PROFILE_PATH"
          echo "EDITION: $EDITION"
          echo "MANJAROBRANCH: $MANJAROBRANCH"
          echo "KERNEL_NAME: $kernel_name"
          echo "SCOPE: $SCOPE"
          echo "OFFICE: $OFFICE"
          sudo buildiso ${SCOPE:+-f} -p "community/$EDITION" -b "$MANJAROBRANCH" -k "linux${kernel_name}" ${OFFICE:+-o} -t /__w/ -f
        }

        cleanup_and_move_files() {
          sudo rm -rf /var/lib/manjaro-tools/buildiso/*
          OUTPUT_ISO_PATH=$(find /var/cache/manjaro-tools/iso -type f -name "*.iso" -exec stat -c '%Y %n' {} \; | sort -nr | awk 'NR==1 {print $2}')
          sudo mv "$OUTPUT_ISO_PATH" "./$TARGET_ISO_PATH"
          echo "file-path=$TARGET_ISO_PATH" >> "$GITHUB_OUTPUT"
          
          FILE_PKG=$(find /var/cache/manjaro-tools/iso -type f -name "*-pkgs.txt" -exec stat -c '%Y %n' {} \; | sort -nr | awk 'NR==1 {print $2}')
          sudo mv "$FILE_PKG" "./${TARGET_ISO_PATH}.pkgs"
          
          sudo rm -r iso-profiles
        }

        main() {
          echo "## Community Pre Config Build ISO ##"
          setup_manjaro_tools
          configure_mesa
          
          echo "Starting kernel configuration..."
          configure_kernel
          echo "Kernel configuration completed."
          
          echo "Starting repository configuration..."
          for config in user-repos.conf live-overlay/etc/pacman.conf root-overlay/etc/pacman.conf; do
            echo "Configuring $config..."
            configure_repos "$PROFILE_PATH/$EDITION/$config" "$COMMUNITYBRANCH" "$BIGBRANCH"
          done
          echo "Repository configuration completed."
          
          set_build_info
          configure_iso_name
          
          # Remover perfis personalizados
          sudo rm -rf iso-profiles/custom-profiles
          
          echo "Kernel: $kernel_name"
          echo "Edition: $EDITION"
          echo "ManjaroBranch: $MANJAROBRANCH"
          echo "CommunityBranch: $COMMUNITYBRANCH"
          echo "BigLinuxBranch: $BIGBRANCH"
          echo "ISO profiles path: $(pwd)/$PROFILE_PATH/$EDITION"
          
          build_iso
          cleanup_and_move_files
          
          ls -lh
        }

        main

    - name: Calculate ISO MD5 Hash
      shell: bash
      run: |
        echo "Calculating MD5 hash for ISO file..."
        ISO_PATH="${{ steps.image-build.outputs.file-path }}"

        # Calculate MD5 hash
        md5sum "$ISO_PATH" > "${ISO_PATH}.md5"

        echo "MD5 hash calculated and saved:"
        cat "${ISO_PATH}.md5"

    - name: Prepare ISO for release
      id: prepare-iso
      shell: bash
      run: |
        ls -lh
        release=$(basename "${{ steps.image-build.outputs.file-path }}" .iso)
        zip -j -0 -s 2000m ${release}.zip ${{ steps.image-build.outputs.file-path }}
        echo "release_name=${release}" >> $GITHUB_OUTPUT
        echo "ISO prepared for release"

    - name: Create GitHub Release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        echo $GITHUB_TOKEN | gh auth login --with-token
        release_name="${{ steps.prepare-iso.outputs.release_name }}"
        gh release create $release_name \
          --title "$release_name" \
          --notes "Automated release from CI/CD" \
          ${{ steps.build.outputs.file-path }} \
          ${{ steps.build.outputs.file-path }}.md5 \
          ${{ steps.build.outputs.file-path }}.pkgs \
          ${release_name}.z*
