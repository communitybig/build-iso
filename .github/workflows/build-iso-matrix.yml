name: Biglinux Build ISO BigLinux Matrix
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'With TMATE'
        required: false
        default: false
        
  schedule:
    - cron:  '0 5 * * 5'
    
  repository_dispatch:
    types:
      - webhook
      - '**'

jobs:
  prepare-release:
    runs-on: ubuntu-20.04
    steps:
      - id: time
        uses: nanzm/get-time-action@v1.1
        with:
          format: 'YYYY-MM-DD_HH-mm'
    outputs:
      release_tag: ${{ steps.time.outputs.time }}
      
  build-release:
    runs-on: ubuntu-20.04
    needs: [prepare-release]
    strategy:
      matrix:
        EDITION: [kde]
        MANJAROBRANCH: [stable]
        BIGBRANCH: [stable]
        # SCOPE: [full]
        #EXTRAREPO: []
        # KERNEL: [510, 515, 60]
        # KERNEL: [510, 515, latest]
        KERNEL: [oldLts, atualLts, latest]
        
